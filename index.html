<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March Madness Pool Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>Round of 64 Upset Pool</h1>
      <p id="updated">Loading...</p>
    </header>

    <section class="card">
      <h2>Leaderboard</h2>
      <table id="leaderboard">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Points</th>
            <th>Correct Picks</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h2>All Picks</h2>
      <div id="picksGrid" class="grid"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
